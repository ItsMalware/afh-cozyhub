name: Secret Leak Prevention

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Full History Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog on push range
        if: github.event_name == 'push'
        run: |
          docker run --rm \
            -v "$PWD":/repo \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///repo \
            --since-commit "${{ github.event.before }}" \
            --branch "${{ github.sha }}" \
            --fail \
            --no-update \
            --github-actions \
            --results=verified,unknown

      - name: Run TruffleHog on PR range
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm \
            -v "$PWD":/repo \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///repo \
            --since-commit "${{ github.event.pull_request.base.sha }}" \
            --branch "${{ github.event.pull_request.head.sha }}" \
            --fail \
            --no-update \
            --github-actions \
            --results=verified,unknown
